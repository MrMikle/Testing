spring:
  application:
    name: recipe-book-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/checkpoint2_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  docker:
    compose:
      enabled: true
      file: docker-compose.yml

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  upload-dir: uploads/photos