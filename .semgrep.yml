rules:
  - id: hardcoded-spring-datasource-password
    message: "Hardcoded database password in Spring configuration. Move password to environment variables or secrets."
    severity: ERROR
    languages:
      - generic
    pattern-regex: '(?i)^\s*password:\s*(?!\$\{)[^#\s]+'
    paths:
      include:
        - "/recipe-book-backend/src/main/resources/application.yml"
    metadata:
      category: security
      owasp: "A04:2025 Cryptographic Failures"
      cwe: "CWE-798"

  - id: docker-compose-hardcoded-postgres-password
    message: "Hardcoded POSTGRES_PASSWORD in docker-compose.yml. Use .env or GitHub Secrets instead."
    severity: ERROR
    languages:
      - generic
    pattern-regex: '^\s*POSTGRES_PASSWORD:\s*(?!\$\{)[^#\s]+'
    paths:
      include:
        - "/recipe-book-backend/docker-compose.yml"
    metadata:
      category: security
      owasp: "A04:2025 Cryptographic Failures"
      cwe: "CWE-798"

  - id: java-file-upload-content-type-trust
    message: "File upload validation relies on client-controlled Content-Type. Validate real file content instead."
    severity: WARNING
    languages:
      - generic
    pattern-regex: '\.getContentType\s*\('
    paths:
      include:
        - "/recipe-book-backend/src/main/java/**/*.java"
    metadata:
      category: security
      owasp: "A02:2025 Security Misconfiguration"
      cwe: "CWE-434"

  - id: spring-cors-wildcard-headers
    message: "CORS allows all request headers. Restrict allowedHeaders to only required headers."
    severity: INFO
    languages:
      - generic
    pattern-regex: '\.allowedHeaders\s*\(\s*"\*"\s*\)'
    paths:
      include:
        - "/recipe-book-backend/src/main/java/**/*.java"
    metadata:
      category: security
      owasp: "A02:2025 Security Misconfiguration"
      cwe: "CWE-942"